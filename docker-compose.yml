    #command: sh -c "npm install -g @expo/ngrok@4.1.0 && rm -rf node_modules && npm install --legacy-peer-deps && npm install @ngrok/ngrok && npx ngrok config add-authtoken 2fDxsvTKKsZjjX3hctYd6dIKykq_826p3Yf6iAm3GZSMd2R2N && npx expo start --clear --reset-cache"
