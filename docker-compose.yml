version: '3.8'

services:
  # MySQL Database
  database:
    image: mysql:8.0
    container_name: food-ordering-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: food_ordering
      MYSQL_USER: foodapp
      MYSQL_PASSWORD: foodapp123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - food-ordering-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Backend API
  backend:
    image: node:20-slim
    container_name: food-ordering-backend
    restart: unless-stopped
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: mysql://foodapp:foodapp123@database:3306/food_ordering
      JWT_SECRET: dev-secret-change-in-production
      JWT_EXPIRES_IN: 7d
      PORT: 3000
    volumes:
      - ./backend:/app
    depends_on:
      database:
        condition: service_healthy
    networks:
      - food-ordering-network
    command: sh -c "apt-get update && apt-get install -y openssl && npm install && npx prisma generate && npm run dev"

  # Frontend Application
  frontend:
    image: node:20-slim
    container_name: food-ordering-frontend
    restart: unless-stopped
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    networks:
      - food-ordering-network
    command: sh -c "npm install && npm run dev -- --host"

  # Waiter Mobile App (Expo Dev Server — tunnel mode for remote device access)
  expo-mobile:
    image: node:20-slim
    container_name: food-ordering-mobile
    restart: unless-stopped
    working_dir: /app
    entrypoint: ["/bin/sh", "/app/entrypoint.sh"]
    ports:
      - "8081:8081"   # Metro bundler
      - "19000:19000" # Expo dev tools
      - "19001:19001" # Expo inspector
      - "19006:19006" # Expo simulator
    environment:
      TERM: xterm-256color
      API_URL: http://dockerhost.hpehellas-demo.com:3000
      EXPO_DEVTOOLS_LISTEN_ADDRESS: 0.0.0.0
      REACT_NATIVE_PACKAGER_HOSTNAME: dockerhost.hpehellas-demo.com
      CI: "false"
      NGROK_AUTHTOKEN : 2fDxsvTKKsZjjX3hctYd6dIKykq_826p3Yf6iAm3GZSMd2R2N
      EXPO_TOKEN: Bj7SUqq5Y3BzOMAt0PsVW4oOp5aD6Ww4YOQoptZR
    volumes:
      - ./mobile:/app
    depends_on:
      - backend
    networks:
      - food-ordering-network
