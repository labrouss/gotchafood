       #" 
  # phpMyAdmin (optional - for database management)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: food-ordering-phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: database
      PMA_PORT: 3306
      PMA_USER: foodapp
      PMA_PASSWORD: foodapp123
    depends_on:
      - database
    networks:
      - food-ordering-network

networks:
  food-ordering-network:
    driver: bridge

volumes:
  mysql_data:
